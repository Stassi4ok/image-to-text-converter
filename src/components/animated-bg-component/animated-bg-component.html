<div class="bg">
  <div
    class="particle"
    *ngFor="let p of particles"
    [ngStyle]="{
      left: p.left + '%',
      width: p.size + 'px',
      height: p.size + 'px',
      animationDuration: p.duration + 's',
      animationDelay: p.delay + 's',
      opacity: p.opacity
    }"
  ></div>
</div>
